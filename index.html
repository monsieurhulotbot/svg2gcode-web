<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG → G-Code (Y/Z)</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2330;
      --text: #e7edf8;
      --muted: #9fb0cc;
      --ok: #22c55e;
      --err: #ef4444;
      --accent: #60a5fa;
      --border: #2c3650;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }
    .wrap {
      max-width: 1100px;
      margin: 18px auto;
      padding: 0 12px 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .row { margin-bottom: 10px; }
    label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 5px;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    input[type="checkbox"] { width: auto; }
    button {
      cursor: pointer;
      border-color: #3a4c75;
      background: #213257;
    }
    button:hover { filter: brightness(1.06); }
    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .inline > * { flex: 1; }
    .status {
      min-height: 1.2em;
      font-size: 0.92rem;
      margin: 6px 0 0;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    #preview {
      background: #0a0d13;
      border: 1px dashed #39435f;
      border-radius: 8px;
      min-height: 250px;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 8px;
    }
    #preview svg {
      width: 100%;
      max-height: 420px;
      background: #0a0d13;
    }
    pre {
      margin: 0;
      background: #0b0f18;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      min-height: 250px;
      max-height: 420px;
      overflow: auto;
      white-space: pre;
      font-size: 12px;
    }
    .hint { color: var(--muted); font-size: 0.84rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SVG → G-Code Konverter (Achsen-Mapping: X→Y, Y→Z)</h1>

    <div class="grid">
      <section class="card">
        <div class="row">
          <label for="svgFile">SVG-Datei</label>
          <input id="svgFile" type="file" accept=".svg,image/svg+xml" />
        </div>

        <div class="row">
          <label for="samples">Sampling-Punkte entlang des Pfads (mehr = feinere Segmentierung)</label>
          <input id="samples" type="number" min="10" step="10" value="400" />
          <div class="hint">Bögen/Kreise im Path werden als Liniensegmente ausgegeben.</div>
        </div>

        <div class="row inline">
          <div>
            <label for="feed">Feedrate (F)</label>
            <input id="feed" type="number" min="1" value="800" />
          </div>
          <div>
            <label for="decimals">Dezimalstellen</label>
            <input id="decimals" type="number" min="0" max="6" value="3" />
          </div>
        </div>

        <div class="row">
          <label for="header">G-Code Header (optional, pro Zeile ein Befehl)</label>
          <textarea id="header" rows="4">G21
G90
G92 X0 Y0 Z0</textarea>
        </div>

        <div class="row">
          <label for="footer">G-Code Footer (optional)</label>
          <textarea id="footer" rows="3">M2</textarea>
        </div>

        <div class="row inline">
          <button id="generateBtn" disabled>G-Code generieren</button>
          <select id="ext">
            <option value="gcode">.gcode</option>
            <option value="nc">.nc</option>
          </select>
          <button id="downloadBtn" disabled>Download</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section class="card">
        <div class="row">
          <label>SVG-Vorschau (nur bei gültiger Datei)</label>
          <div id="preview"><span class="hint">Noch keine Datei geladen</span></div>
        </div>
        <div class="row">
          <label>Generierter G-Code</label>
          <pre id="gcodeOut"></pre>
        </div>
      </section>
    </div>
  </div>

  <script>
    // --- Kleine Utility-Funktionen ---
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || "";
      statusEl.className = "status " + (msg ? (isError ? "err" : "ok") : "");
    }

    function fmt(n, decimals) {
      return Number(n).toFixed(decimals);
    }

    function linesFromTextarea(text) {
      return (text || "")
        .split(/\r?\n/)
        .map((s) => s.trim())
        .filter(Boolean);
    }

    // --- Zustand ---
    let svgText = "";
    let parsedPath = null; // SVGPathElement (aus DOMParser-Dokument)
    let lastGcode = "";
    let lastFileBase = "output";

    // Validiert: genau ein <path>, keine weiteren Shape-Elemente.
    function validateSvgStrictOnePath(svgString) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(svgString, "image/svg+xml");

      // Parserfehler erkennen
      if (doc.querySelector("parsererror")) {
        return { ok: false, error: "Ungültiges SVG (Parserfehler)." };
      }

      const svg = doc.documentElement;
      if (!svg || svg.tagName.toLowerCase() !== "svg") {
        return { ok: false, error: "Datei enthält kein <svg>-Root-Element." };
      }

      const paths = svg.querySelectorAll("path");
      if (paths.length !== 1) {
        return { ok: false, error: `Erwartet genau 1 <path>, gefunden: ${paths.length}.` };
      }

      // Verbotene zusätzliche Shapes (laut Anforderung: nur ein Path, keine anderen Shapes)
      const forbiddenShapeSelectors = "rect,circle,ellipse,line,polyline,polygon";
      const others = svg.querySelectorAll(forbiddenShapeSelectors);
      if (others.length > 0) {
        return {
          ok: false,
          error: `Nicht erlaubt: andere Shapes gefunden (${others.length}). Nur ein <path> ist erlaubt.`
        };
      }

      return { ok: true, svg, path: paths[0] };
    }

    // Zeichnet eine sichere Vorschau: nur den validierten Path in ein eigenes SVG einsetzen.
    function renderPreview(pathEl) {
      const preview = $("preview");
      preview.innerHTML = "";

      const d = pathEl.getAttribute("d") || "";
      const vb = pathEl.ownerSVGElement.getAttribute("viewBox");

      const ns = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      if (vb) {
        svg.setAttribute("viewBox", vb);
      } else {
        // Fallback ohne viewBox
        svg.setAttribute("viewBox", "0 0 200 200");
      }
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

      const g = document.createElementNS(ns, "g");
      g.setAttribute("transform", "scale(1,1)");

      const path = document.createElementNS(ns, "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "#60a5fa");
      path.setAttribute("stroke-width", "1.5");

      g.appendChild(path);
      svg.appendChild(g);
      preview.appendChild(svg);
    }

    // Erzeugt Stützpunkte entlang des gesamten Pathes.
    // Damit werden alle Kurven/Bögen (inkl. Arc-Kommandos) automatisch in Liniensegmente zerlegt.
    function samplePath(pathEl, sampleCount) {
      const total = pathEl.getTotalLength();
      if (!isFinite(total) || total <= 0) {
        throw new Error("Pfadlänge ist 0 oder ungültig.");
      }

      const n = Math.max(2, sampleCount | 0);
      const points = [];
      for (let i = 0; i <= n; i++) {
        const t = (i / n) * total;
        const p = pathEl.getPointAtLength(t);
        points.push({ x: p.x, y: p.y });
      }
      return points;
    }

    // Wandelt Punkte in G-Code um mit Achsen-Mapping:
    // SVG X -> G-Code Y
    // SVG Y -> G-Code Z
    // G-Code X bleibt 0 (nicht genutzt, aber explizit gesetzt)
    function pointsToGcode(points, options) {
      const { feed, decimals, headerLines, footerLines } = options;

      const out = [];
      out.push("; Generated by SVG->GCode (YZ mapping)");
      out.push("; Mapping: SVG X -> GCode Y, SVG Y -> GCode Z, GCode X fixed to 0");
      out.push(...headerLines);

      if (!points.length) {
        throw new Error("Keine Punkte zum Konvertieren vorhanden.");
      }

      const p0 = points[0];
      out.push(`G0 X0 Y${fmt(p0.x, decimals)} Z${fmt(p0.y, decimals)}`);

      for (let i = 1; i < points.length; i++) {
        const p = points[i];
        out.push(`G1 X0 Y${fmt(p.x, decimals)} Z${fmt(p.y, decimals)} F${feed}`);
      }

      out.push(...footerLines);
      return out.join("\n") + "\n";
    }

    function resetOutput() {
      $("gcodeOut").textContent = "";
      lastGcode = "";
      $("downloadBtn").disabled = true;
    }

    $("svgFile").addEventListener("change", async (ev) => {
      resetOutput();
      parsedPath = null;
      setStatus("");

      const file = ev.target.files?.[0];
      if (!file) return;

      lastFileBase = file.name.replace(/\.[^.]+$/, "") || "output";

      try {
        svgText = await file.text();
        const res = validateSvgStrictOnePath(svgText);
        if (!res.ok) {
          $("generateBtn").disabled = true;
          $("preview").innerHTML = `<span class="hint">Keine Vorschau</span>`;
          setStatus(res.error, true);
          return;
        }

        parsedPath = res.path;
        renderPreview(parsedPath);
        $("generateBtn").disabled = false;
        setStatus("SVG ist gültig: genau ein <path>, keine anderen Shapes.");
      } catch (err) {
        $("generateBtn").disabled = true;
        $("preview").innerHTML = `<span class="hint">Keine Vorschau</span>`;
        setStatus("Fehler beim Lesen/Validieren: " + err.message, true);
      }
    });

    $("generateBtn").addEventListener("click", () => {
      if (!parsedPath) {
        setStatus("Bitte zuerst eine gültige SVG laden.", true);
        return;
      }

      try {
        const sampleCount = Number($("samples").value || 400);
        const feed = Number($("feed").value || 800);
        const decimals = Math.max(0, Math.min(6, Number($("decimals").value || 3)));

        const points = samplePath(parsedPath, sampleCount);

        const gcode = pointsToGcode(points, {
          feed,
          decimals,
          headerLines: linesFromTextarea($("header").value),
          footerLines: linesFromTextarea($("footer").value)
        });

        lastGcode = gcode;
        $("gcodeOut").textContent = gcode;
        $("downloadBtn").disabled = false;

        setStatus(`G-Code erzeugt: ${points.length} Punkte (${sampleCount} Segmente).`);
      } catch (err) {
        resetOutput();
        setStatus("Fehler bei der G-Code-Generierung: " + err.message, true);
      }
    });

    $("downloadBtn").addEventListener("click", () => {
      if (!lastGcode) return;
      const ext = $("ext").value || "gcode";
      const blob = new Blob([lastGcode], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${lastFileBase || "output"}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
