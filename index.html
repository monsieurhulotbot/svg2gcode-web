<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG → G-Code Converter</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2330;
      --text: #e7edf8;
      --muted: #9fb0cc;
      --ok: #22c55e;
      --err: #ef4444;
      --accent: #60a5fa;
      --border: #2c3650;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }
    .wrap {
      max-width: 1100px;
      margin: 18px auto;
      padding: 0 12px 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .row { margin-bottom: 10px; }
    label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 5px;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    input[type="checkbox"] { width: auto; }
    button {
      cursor: pointer;
      border-color: #3a4c75;
      background: #213257;
    }
    button:hover { filter: brightness(1.06); }
    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .inline > * { flex: 1; }
    .status {
      min-height: 1.2em;
      font-size: 0.92rem;
      margin: 6px 0 0;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    #preview {
      background: #0a0d13;
      border: 1px dashed #39435f;
      border-radius: 8px;
      min-height: 250px;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 8px;
    }
    #preview svg {
      width: 100%;
      max-height: 420px;
      background: #0a0d13;
    }
    #gcodeOut {
      margin: 0;
      background: #0b0f18;
      min-height: 250px;
      max-height: 420px;
      overflow: auto;
      white-space: pre;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      resize: vertical;
    }
    .serial-panel {
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }
    #serialLog {
      min-height: 140px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      resize: vertical;
    }
    .hint { color: var(--muted); font-size: 0.84rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SVG → G‑Code Converter</h1>

    <div class="grid">
      <section class="card">
        <div class="row">
          <label for="svgFile">SVG file</label>
          <input id="svgFile" type="file" accept=".svg,image/svg+xml" />
          <div id="uploadStatus" class="status" style="margin-top:0.5rem;"></div>
        </div>

        <div class="row">
          <label for="tolerance">Curve tolerance (mm) — smaller = more detail</label>
          <input id="tolerance" type="number" min="0.001" step="0.01" value="0.05" />
          <div class="hint">Adaptive sampling: adds points only where needed. Straight segments stay lean, curves get detail.</div>
        </div>

        <div class="row inline">
          <div>
            <label for="feed">Feedrate (F)</label>
            <input id="feed" type="number" min="1" value="800" />
          </div>
          <div>
            <label for="decimals">Decimals</label>
            <input id="decimals" type="number" min="0" max="6" value="3" />
          </div>
        </div>

        <div class="row">
          <h3 style="margin-top:0; margin-bottom:1rem;">Axis Mapping</h3>
          <div class="hint">Map SVG axes to CNC axes. For each axis you can enable “invert”.</div>
        </div>

        <div class="row inline" style="gap:1rem;">
          <div style="flex:1;">
            <label for="mapX">SVG X →</label>
            <select id="mapX">
              <option value="X">CNC X</option>
              <option value="Y" selected>CNC Y</option>
              <option value="Z">CNC Z</option>
            </select>
          </div>
          <div style="flex:1; display:flex; align-items:center; gap:0.5rem;">
            <input id="mirrorX" type="checkbox" />
            <label for="mirrorX" style="margin:0; white-space:nowrap;">invert</label>
          </div>
        </div>

        <div class="row inline" style="gap:1rem;">
          <div style="flex:1;">
            <label for="mapY">SVG Y →</label>
            <select id="mapY">
              <option value="X">CNC X</option>
              <option value="Y">CNC Y</option>
              <option value="Z" selected>CNC Z</option>
            </select>
          </div>
          <div style="flex:1; display:flex; align-items:center; gap:0.5rem;">
            <input id="mirrorY" type="checkbox" checked />
            <label for="mirrorY" style="margin:0; white-space:nowrap;">invert</label>
          </div>
        </div>

        <div class="row">
          <label for="header">G‑Code header (optional, one command per line)</label>
          <textarea id="header" rows="4">G21
G90
G92 X0 Y0 Z0</textarea>
        </div>

        <div class="row">
          <label for="footer">G‑Code footer (optional)</label>
          <textarea id="footer" rows="3">M2</textarea>
        </div>

        <div class="row inline">
          <button id="generateBtn" disabled>Generate G‑Code</button>
          <select id="ext">
            <option value="gcode">.gcode</option>
            <option value="nc">.nc</option>
          </select>
          <button id="downloadBtn" disabled>Download</button>
          <button id="ncviewerBtn" disabled>NCViewer</button>
        </div>

        <div id="status" class="status"></div>

        <div class="row" style="margin-top:1rem;">
          <button id="resetBtn" style="background:transparent; border:1px solid var(--border); color:var(--muted); font-size:0.82rem; padding:5px 10px;">Reset all settings to defaults</button>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <label>SVG preview (only with valid file)</label>
          <div id="preview"><span class="hint">No file loaded yet</span></div>
        </div>
        <div class="row">
          <label>Generated G‑Code</label>
          <div style="position:relative;">
            <textarea id="gcodeOut" spellcheck="false" placeholder="Generated G-Code appears here and can be edited manually."></textarea>
            <button id="copyBtn" style="position:absolute; top:8px; right:8px; width:auto; font-size:12px; padding:4px 8px;" disabled>Copy</button>
          </div>
        </div>

        <div class="serial-panel">
          <div class="row">
            <label>CNC Serial Control</label>
            <div id="serialSupportMsg" class="hint">Checking Web Serial support...</div>
            <div id="serialStatus" class="status"></div>
          </div>

          <div class="row inline">
            <div>
              <label for="baudRate">Baudrate</label>
              <select id="baudRate">
                <option value="250000">250000</option>
                <option value="115200" selected>115200</option>
                <option value="57600">57600</option>
                <option value="38400">38400</option>
                <option value="19200">19200</option>
                <option value="9600">9600</option>
              </select>
            </div>
            <div>
              <label>&nbsp;</label>
              <button id="connectSerialBtn">Connect USB Serial</button>
            </div>
            <div>
              <label>&nbsp;</label>
              <button id="disconnectSerialBtn" disabled>Disconnect</button>
            </div>
          </div>

          <div class="row inline">
            <button id="sendGcodeBtn" disabled>Send full G-Code</button>
            <input id="homeCmd" type="text" value="G28" />
            <button id="homeBtn" disabled>Home</button>
          </div>

          <div class="row inline">
            <input id="terminalCmd" type="text" placeholder="Manual command, e.g. M114" />
            <button id="sendTerminalBtn" disabled>Send</button>
          </div>

          <div class="row">
            <label for="serialLog">Serial Terminal Log</label>
            <textarea id="serialLog" readonly spellcheck="false" placeholder="Printer responses appear here..."></textarea>
          </div>
        </div>

      </section>
    </div>
  </div>

  <script>
    // --- Kleine Utility-Funktionen ---
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const uploadStatusEl = $("uploadStatus");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || "";
      statusEl.className = "status " + (msg ? (isError ? "err" : "ok") : "");
    }
    function setUploadStatus(msg, isError = false) {
      if (uploadStatusEl) {
        uploadStatusEl.textContent = msg || "";
        uploadStatusEl.className = "status " + (msg ? (isError ? "err" : "ok") : "");
      }
    }

    function fmt(n, decimals) {
      return Number(n).toFixed(decimals);
    }

    function linesFromTextarea(text) {
      return (text || "")
        .split(/\r?\n/)
        .map((s) => s.trim())
        .filter(Boolean);
    }

    // --- Cookie storage for all settings ---
    const COOKIE_NAME = "svg2gcode_config";
    const COOKIE_DAYS = 30;

    const DEFAULTS = {
      mapX: "Y", mapY: "Z",
      mirrorX: false, mirrorY: true,
      tolerance: "0.05", feed: "800", decimals: "3",
      header: "G21\nG90\nG92 X0 Y0 Z0", footer: "M2",
      ext: "gcode"
    };

    function saveConfig() {
      const config = {
        mapX: $("mapX").value,
        mapY: $("mapY").value,
        mirrorX: $("mirrorX").checked,
        mirrorY: $("mirrorY").checked,
        tolerance: $("tolerance").value,
        feed: $("feed").value,
        decimals: $("decimals").value,
        header: $("header").value,
        footer: $("footer").value,
        ext: $("ext").value
      };
      const expires = new Date(Date.now() + COOKIE_DAYS * 864e5).toUTCString();
      document.cookie = `${COOKIE_NAME}=${encodeURIComponent(JSON.stringify(config))}; expires=${expires}; path=/`;
    }

    function loadConfig() {
      const match = document.cookie.match(new RegExp(`(?:^|; )${COOKIE_NAME}=([^;]*)`));
      if (!match) return false;
      try {
        const config = JSON.parse(decodeURIComponent(match[1]));
        if (config.mapX && ["X","Y","Z"].includes(config.mapX)) $("mapX").value = config.mapX;
        if (config.mapY && ["X","Y","Z"].includes(config.mapY)) $("mapY").value = config.mapY;
        if (typeof config.mirrorX === "boolean") $("mirrorX").checked = config.mirrorX;
        if (typeof config.mirrorY === "boolean") $("mirrorY").checked = config.mirrorY;
        if (config.tolerance) $("tolerance").value = config.tolerance;
        if (config.feed) $("feed").value = config.feed;
        if (config.decimals) $("decimals").value = config.decimals;
        if (typeof config.header === "string") $("header").value = config.header;
        if (typeof config.footer === "string") $("footer").value = config.footer;
        if (config.ext && ["gcode","nc"].includes(config.ext)) $("ext").value = config.ext;
        return true;
      } catch (e) {
        console.warn("Failed to parse cookie", e);
        return false;
      }
    }

    function resetConfig() {
      // Delete cookie
      document.cookie = `${COOKIE_NAME}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/`;
      // Restore defaults
      $("mapX").value = DEFAULTS.mapX;
      $("mapY").value = DEFAULTS.mapY;
      $("mirrorX").checked = DEFAULTS.mirrorX;
      $("mirrorY").checked = DEFAULTS.mirrorY;
      $("tolerance").value = DEFAULTS.tolerance;
      $("feed").value = DEFAULTS.feed;
      $("decimals").value = DEFAULTS.decimals;
      $("header").value = DEFAULTS.header;
      $("footer").value = DEFAULTS.footer;
      $("ext").value = DEFAULTS.ext;
      refreshPreviewIfLoaded();
    }

    
    // Refresh the preview if a path is already loaded
    function refreshPreviewIfLoaded() {
      if (parsedShape) {
        renderPreview(parsedShape);
      }
    }
// Load config and attach change listeners on page load
    document.addEventListener("DOMContentLoaded", () => {
      loadConfig();
      // Save on any settings change
      const watchEls = [$("mapX"), $("mapY"), $("mirrorX"), $("mirrorY"),
                         $("tolerance"), $("feed"), $("decimals"), $("ext")];
      watchEls.forEach(el => {
        if (el) el.addEventListener("change", () => {
          saveConfig();
          refreshPreviewIfLoaded();
        });
      });
      // Also save header/footer on input (textareas)
      [$("header"), $("footer")].forEach(el => {
        if (el) el.addEventListener("input", saveConfig);
      });
      // Reset button
      $("resetBtn").addEventListener("click", resetConfig);

      $("gcodeOut").addEventListener("input", () => {
        lastGcode = getCurrentGcode();
        const has = !!lastGcode.trim();
        $("downloadBtn").disabled = !has;
        $("copyBtn").disabled = !has;
        $("ncviewerBtn").disabled = !has;
        updateSerialUiState();
      });

      const serialSupported = supportsWebSerial();
      $("serialSupportMsg").textContent = serialSupported
        ? "Web Serial API available (Chromium-based browsers)."
        : "Web Serial API is not available in this browser. Use Download to transfer G-Code manually.";
      if (!serialSupported) {
        setSerialStatus("Serial disabled (browser unsupported).", true);
      }

      $("connectSerialBtn").addEventListener("click", openSerialConnection);
      $("disconnectSerialBtn").addEventListener("click", closeSerialConnection);

      $("sendGcodeBtn").addEventListener("click", async () => {
        const lines = getCurrentGcode().split(/\r?\n/).map(s => s.trim()).filter(Boolean);
        if (!lines.length) {
          setSerialStatus("No G-Code to send.", true);
          return;
        }
        try {
          setSerialStatus(`Sending ${lines.length} lines...`);
          for (let i = 0; i < lines.length; i++) {
            await sendSerialLine(lines[i]);
            await delay(20);
          }
          setSerialStatus(`G-Code sent (${lines.length} lines).`);
        } catch (err) {
          setSerialStatus("Send failed: " + (err?.message || err), true);
        }
      });

      $("homeBtn").addEventListener("click", async () => {
        const cmd = ($("homeCmd").value || "G28").trim() || "G28";
        try {
          await sendSerialLine(cmd);
          setSerialStatus(`Home command sent: ${cmd}`);
        } catch (err) {
          setSerialStatus("Home failed: " + (err?.message || err), true);
        }
      });

      $("sendTerminalBtn").addEventListener("click", async () => {
        const cmd = $("terminalCmd").value.trim();
        if (!cmd) return;
        try {
          await sendSerialLine(cmd);
          $("terminalCmd").value = "";
          setSerialStatus("Command sent.");
        } catch (err) {
          setSerialStatus("Terminal send failed: " + (err?.message || err), true);
        }
      });

      $("terminalCmd").addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          $("sendTerminalBtn").click();
        }
      });

      updateSerialUiState();
    });
// --- Zustand ---
    let svgText = "";
    let parsedShape = null; // Any SVG shape element (path, rect, circle, etc.)
    let lastGcode = "";
    let lastFileBase = "output";

    let serialPort = null;
    let serialReader = null;
    let serialWriter = null;
    let serialKeepReading = false;

    function supportsWebSerial() {
      return typeof navigator !== "undefined" && "serial" in navigator;
    }

    function getCurrentGcode() {
      return $("gcodeOut").value || "";
    }

    function appendSerialLog(text) {
      const el = $("serialLog");
      if (!el) return;
      el.value += text;
      el.scrollTop = el.scrollHeight;
    }

    function setSerialStatus(msg, isError = false) {
      const el = $("serialStatus");
      if (!el) return;
      el.textContent = msg || "";
      el.className = "status " + (msg ? (isError ? "err" : "ok") : "");
    }

    function updateSerialUiState() {
      const connected = !!serialPort?.readable && !!serialPort?.writable;
      const hasGcode = !!getCurrentGcode().trim();
      $("connectSerialBtn").disabled = !supportsWebSerial() || connected;
      $("disconnectSerialBtn").disabled = !connected;
      $("sendGcodeBtn").disabled = !connected || !hasGcode;
      $("homeBtn").disabled = !connected;
      $("sendTerminalBtn").disabled = !connected;
      $("baudRate").disabled = connected;
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startSerialReader() {
      if (!serialPort?.readable) return;
      const decoder = new TextDecoderStream();
      serialPort.readable.pipeTo(decoder.writable).catch(() => {});
      serialReader = decoder.readable.getReader();
      serialKeepReading = true;
      while (serialKeepReading && serialReader) {
        try {
          const { value, done } = await serialReader.read();
          if (done) break;
          if (value) appendSerialLog(value);
        } catch (_) {
          break;
        }
      }
    }

    async function openSerialConnection() {
      if (!supportsWebSerial()) {
        setSerialStatus("Web Serial API not supported in this browser. Use Download instead.", true);
        return;
      }
      try {
        serialPort = await navigator.serial.requestPort();
        const baudRate = Number($("baudRate").value || 115200);
        await serialPort.open({ baudRate });
        serialWriter = serialPort.writable.getWriter();
        setSerialStatus(`Connected at ${baudRate} baud.`);
        appendSerialLog(`\n[connected ${baudRate} baud]\n`);
        startSerialReader();
      } catch (err) {
        serialPort = null;
        setSerialStatus("Serial connect failed: " + (err?.message || err), true);
      }
      updateSerialUiState();
    }

    async function closeSerialConnection() {
      try {
        serialKeepReading = false;
        if (serialReader) {
          await serialReader.cancel().catch(() => {});
          serialReader.releaseLock();
          serialReader = null;
        }
        if (serialWriter) {
          serialWriter.releaseLock();
          serialWriter = null;
        }
        if (serialPort) {
          await serialPort.close().catch(() => {});
        }
      } finally {
        serialPort = null;
        setSerialStatus("Disconnected.");
        appendSerialLog("\n[disconnected]\n");
        updateSerialUiState();
      }
    }

    async function sendSerialLine(line) {
      if (!serialWriter) throw new Error("Serial port not connected.");
      const encoder = new TextEncoder();
      const payload = line.endsWith("\n") ? line : `${line}\n`;
      await serialWriter.write(encoder.encode(payload));
      appendSerialLog(`> ${line.trim()}\n`);
    }

    const SHAPE_SELECTOR = "path,rect,circle,ellipse,line,polyline,polygon";

    // Convert any SVG shape to a <path> element, baking in any transform attributes.
    // This normalizes rect/circle/ellipse/etc. into path `d` data so that
    // anchor extraction and sampling work uniformly.
    function shapeToPath(shapeEl) {
      const ns = "http://www.w3.org/2000/svg";
      const tag = shapeEl.tagName.toLowerCase();

      // We need a live SVG context for geometry calculations
      const tmpSvg = document.createElementNS(ns, "svg");
      tmpSvg.setAttribute("viewBox", "0 0 10000 10000");
      tmpSvg.style.cssText = "position:absolute;visibility:hidden;width:0;height:0";
      const clone = shapeEl.cloneNode(true);
      tmpSvg.appendChild(clone);
      document.body.appendChild(tmpSvg);

      let d = "";
      if (tag === "path") {
        d = clone.getAttribute("d") || "";
      } else if (tag === "rect") {
        const x = parseFloat(clone.getAttribute("x")) || 0;
        const y = parseFloat(clone.getAttribute("y")) || 0;
        const w = parseFloat(clone.getAttribute("width")) || 0;
        const h = parseFloat(clone.getAttribute("height")) || 0;
        const rx = Math.min(parseFloat(clone.getAttribute("rx") || clone.getAttribute("ry")) || 0, w / 2);
        const ry = Math.min(parseFloat(clone.getAttribute("ry") || clone.getAttribute("rx")) || 0, h / 2);
        if (rx > 0 || ry > 0) {
          d = `M${x + rx},${y}`
            + `L${x + w - rx},${y}`
            + `A${rx},${ry} 0 0 1 ${x + w},${y + ry}`
            + `L${x + w},${y + h - ry}`
            + `A${rx},${ry} 0 0 1 ${x + w - rx},${y + h}`
            + `L${x + rx},${y + h}`
            + `A${rx},${ry} 0 0 1 ${x},${y + h - ry}`
            + `L${x},${y + ry}`
            + `A${rx},${ry} 0 0 1 ${x + rx},${y}`
            + `Z`;
        } else {
          d = `M${x},${y}L${x + w},${y}L${x + w},${y + h}L${x},${y + h}Z`;
        }
      } else if (tag === "circle") {
        const cx = parseFloat(clone.getAttribute("cx")) || 0;
        const cy = parseFloat(clone.getAttribute("cy")) || 0;
        const r = parseFloat(clone.getAttribute("r")) || 0;
        d = `M${cx - r},${cy}`
          + `A${r},${r} 0 1 0 ${cx + r},${cy}`
          + `A${r},${r} 0 1 0 ${cx - r},${cy}Z`;
      } else if (tag === "ellipse") {
        const cx = parseFloat(clone.getAttribute("cx")) || 0;
        const cy = parseFloat(clone.getAttribute("cy")) || 0;
        const rx = parseFloat(clone.getAttribute("rx")) || 0;
        const ry = parseFloat(clone.getAttribute("ry")) || 0;
        d = `M${cx - rx},${cy}`
          + `A${rx},${ry} 0 1 0 ${cx + rx},${cy}`
          + `A${rx},${ry} 0 1 0 ${cx - rx},${cy}Z`;
      } else if (tag === "line") {
        const x1 = parseFloat(clone.getAttribute("x1")) || 0;
        const y1 = parseFloat(clone.getAttribute("y1")) || 0;
        const x2 = parseFloat(clone.getAttribute("x2")) || 0;
        const y2 = parseFloat(clone.getAttribute("y2")) || 0;
        d = `M${x1},${y1}L${x2},${y2}`;
      } else if (tag === "polyline" || tag === "polygon") {
        const pts = (clone.getAttribute("points") || "").trim();
        const coords = pts.split(/[\s,]+/).map(Number);
        if (coords.length >= 2) {
          d = `M${coords[0]},${coords[1]}`;
          for (let i = 2; i < coords.length - 1; i += 2) {
            d += `L${coords[i]},${coords[i + 1]}`;
          }
          if (tag === "polygon") d += "Z";
        }
      }

      // Bake in transform attribute if present
      const transform = clone.getAttribute("transform");
      if (transform && d) {
        // Strategy: put the path with its d inside a <g transform="...">,
        // then use the browser's own SVG rendering to get the real transformed points.
        const g = document.createElementNS(ns, "g");
        g.setAttribute("transform", transform);
        const pathTmp = document.createElementNS(ns, "path");
        pathTmp.setAttribute("d", d);
        g.appendChild(pathTmp);
        tmpSvg.appendChild(g);

        // getPointAtLength returns local coords, but we need transformed coords.
        // Use the SVG's createSVGPoint + getCTM to transform them.
        const total = pathTmp.getTotalLength();
        const ctm = pathTmp.getCTM();
        const svgRoot = pathTmp.ownerSVGElement;

        // Extract anchors from the untransformed d
        const fakeEl = { tagName: "path", getAttribute: (a) => a === "d" ? d : null };
        const anchors = extractAnchors(fakeEl);

        if (anchors.length >= 2) {
          // Transform anchor coords through CTM, then build adaptive path
          const transformPt = (px, py) => {
            const pt = svgRoot.createSVGPoint();
            pt.x = px; pt.y = py;
            const tp = pt.matrixTransform(ctm);

      } else {
        // Open path: just check if reversing puts the nearer end first
        if (cncDist(last) < cncDist(first)) {
          return points.slice().reverse();
        }
        return points;
      }
    }

    function resetOutput() {
      $("gcodeOut").value = "";
      lastGcode = "";
      $("downloadBtn").disabled = true;
      $("copyBtn").disabled = true;
      $("ncviewerBtn").disabled = true;
      updateSerialUiState();
    }

    $("svgFile").addEventListener("change", async (ev) => {
      resetOutput();
      parsedShape = null;
      setStatus("");

      const file = ev.target.files?.[0];
      if (!file) return;

      lastFileBase = file.name.replace(/\.[^.]+$/, "") || "output";

      try {
        svgText = await file.text();
        const res = validateSvgSingleShape(svgText);
        if (!res.ok) {
          $("generateBtn").disabled = true;
          $("preview").innerHTML = `<span class="hint">No preview</span>`;
          setUploadStatus(res.error, true);
          return;
        }

        parsedShape = res.shape;
        renderPreview(parsedShape);
        $("generateBtn").disabled = false;
        setUploadStatus("SVG is valid: exactly one shape element found.");
      } catch (err) {
        $("generateBtn").disabled = true;
        $("preview").innerHTML = `<span class="hint">No preview</span>`;
        setUploadStatus("Error reading/validating: " + err.message, true);
      }
    });

    $("generateBtn").addEventListener("click", () => {
      if (!parsedShape) {
        setStatus("Please load a valid SVG first.", true);
        return;
      }

      try {
        const tolerance = Math.max(0.001, Number($("tolerance").value || 0.05));
        const feed = Number($("feed").value || 800);
        const decimals = Math.max(0, Math.min(6, Number($("decimals").value || 3)));

        const points = sampleShape(parsedShape, tolerance);
        const gcode = pointsToGcode(points, {
          feed,
          decimals,
          headerLines: linesFromTextarea($("header").value),
          footerLines: linesFromTextarea($("footer").value)
        });

        lastGcode = gcode;
        $("gcodeOut").value = gcode;
        $("downloadBtn").disabled = false;
        $("copyBtn").disabled = false;
        $("ncviewerBtn").disabled = false;
        updateSerialUiState();

        setStatus(`G-Code generated: ${points.length} points (tolerance ${tolerance} mm).`);
      } catch (err) {
        resetOutput();
        setStatus("Error generating G‑Code: " + err.message, true);
      }
    });

    $("downloadBtn").addEventListener("click", () => {
      const gcode = getCurrentGcode();
      if (!gcode.trim()) return;
      lastGcode = gcode;
      const ext = $("ext").value || "gcode";
      const blob = new Blob([gcode], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${lastFileBase || "output"}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    $("copyBtn").addEventListener("click", async () => {
      const gcode = getCurrentGcode();
      if (!gcode.trim()) return;
      lastGcode = gcode;
      try {
        await navigator.clipboard.writeText(gcode);
        const btn = $("copyBtn");
        const old = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = old), 1200);
        setStatus("G‑Code copied to clipboard.");
      } catch (err) {
        setStatus("Copy failed: " + (err?.message || err), true);
      }
    });

    $("ncviewerBtn").addEventListener("click", async () => {
      const gcode = getCurrentGcode();
      if (!gcode.trim()) return;
      lastGcode = gcode;
      try {
        await navigator.clipboard.writeText(gcode);
        setStatus("NCViewer opened. G‑Code is in clipboard.");
      } catch (_) {
        setStatus("NCViewer opened. If needed, copy G‑Code manually.");
      }
      window.open("https://ncviewer.com/", "_blank", "noopener,noreferrer");
    });
  </script>
</body>
</html>
