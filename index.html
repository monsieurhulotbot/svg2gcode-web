<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG → G-Code (Y/Z)</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2330;
      --text: #e7edf8;
      --muted: #9fb0cc;
      --ok: #22c55e;
      --err: #ef4444;
      --accent: #60a5fa;
      --border: #2c3650;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }
    .wrap {
      max-width: 1100px;
      margin: 18px auto;
      padding: 0 12px 18px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .row { margin-bottom: 10px; }
    label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 5px;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    input[type="checkbox"] { width: auto; }
    button {
      cursor: pointer;
      border-color: #3a4c75;
      background: #213257;
    }
    button:hover { filter: brightness(1.06); }
    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .inline > * { flex: 1; }
    .status {
      min-height: 1.2em;
      font-size: 0.92rem;
      margin: 6px 0 0;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--err); }
    #preview {
      background: #0a0d13;
      border: 1px dashed #39435f;
      border-radius: 8px;
      min-height: 250px;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 8px;
    }
    #preview svg {
      width: 100%;
      max-height: 420px;
      background: #0a0d13;
    }
    pre {
      margin: 0;
      background: #0b0f18;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      min-height: 250px;
      max-height: 420px;
      overflow: auto;
      white-space: pre;
      font-size: 12px;
    }
    .hint { color: var(--muted); font-size: 0.84rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SVG → G‑Code Converter (axis mapping: X→Y, Y→Z)</h1>

    <div class="grid">
      <section class="card">
        <div class="row">
          <label for="svgFile">SVG file</label>
          <input id="svgFile" type="file" accept=".svg,image/svg+xml" />
          <div id="uploadStatus" class="status" style="margin-top:0.5rem;"></div>
        </div>

        <div class="row">
          <label for="samples">Sampling points along path (more = finer segmentation)</label>
          <input id="samples" type="number" min="10" step="10" value="400" />
          <div class="hint">Arcs/circles in the path are output as line segments.</div>
        </div>

        <div class="row inline">
          <div>
            <label for="feed">Feedrate (F)</label>
            <input id="feed" type="number" min="1" value="800" />
          </div>
          <div>
            <label for="decimals">Decimals</label>
            <input id="decimals" type="number" min="0" max="6" value="3" />
          </div>
        </div>

        <div class="row">
          <h3 style="margin-top:0; margin-bottom:1rem;">Axis Mapping</h3>
          <div class="hint">Map SVG axes to CNC axes. For each axis you can enable “invert”.</div>
        </div>

        <div class="row inline" style="gap:1rem;">
          <div style="flex:1;">
            <label for="mapX">SVG X →</label>
            <select id="mapX">
              <option value="X">CNC X</option>
              <option value="Y" selected>CNC Y</option>
              <option value="Z">CNC Z</option>
            </select>
          </div>
          <div style="flex:1; display:flex; align-items:center; gap:0.5rem;">
            <input id="mirrorX" type="checkbox" />
            <label for="mirrorX" style="margin:0; white-space:nowrap;">invert</label>
          </div>
        </div>

        <div class="row inline" style="gap:1rem;">
          <div style="flex:1;">
            <label for="mapY">SVG Y →</label>
            <select id="mapY">
              <option value="X">CNC X</option>
              <option value="Y">CNC Y</option>
              <option value="Z" selected>CNC Z</option>
            </select>
          </div>
          <div style="flex:1; display:flex; align-items:center; gap:0.5rem;">
            <input id="mirrorY" type="checkbox" checked />
            <label for="mirrorY" style="margin:0; white-space:nowrap;">invert</label>
          </div>
        </div>

        <div class="row">
          <label for="header">G‑Code header (optional, one command per line)</label>
          <textarea id="header" rows="4">G21
G90
G92 X0 Y0 Z0</textarea>
        </div>

        <div class="row">
          <label for="footer">G‑Code footer (optional)</label>
          <textarea id="footer" rows="3">M2</textarea>
        </div>

        <div class="row inline">
          <button id="generateBtn" disabled>Generate G‑Code</button>
          <select id="ext">
            <option value="gcode">.gcode</option>
            <option value="nc">.nc</option>
          </select>
          <button id="downloadBtn" disabled>Download</button>
          <button id="ncviewerBtn" disabled>NCViewer</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section class="card">
        <div class="row">
          <label>SVG preview (only with valid file)</label>
          <div id="preview"><span class="hint">No file loaded yet</span></div>
        </div>
        <div class="row">
          <label>Generated G‑Code</label>
          <div style="position:relative;">
            <pre id="gcodeOut"></pre>
            <button id="copyBtn" style="position:absolute; top:8px; right:8px; width:auto; font-size:12px; padding:4px 8px;" disabled>Copy</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // --- Kleine Utility-Funktionen ---
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const uploadStatusEl = $("uploadStatus");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || "";
      statusEl.className = "status " + (msg ? (isError ? "err" : "ok") : "");
    }
    function setUploadStatus(msg, isError = false) {
      if (uploadStatusEl) {
        uploadStatusEl.textContent = msg || "";
        uploadStatusEl.className = "status " + (msg ? (isError ? "err" : "ok") : "");
      }
    }

    function fmt(n, decimals) {
      return Number(n).toFixed(decimals);
    }

    function linesFromTextarea(text) {
      return (text || "")
        .split(/\r?\n/)
        .map((s) => s.trim())
        .filter(Boolean);
    }

    // --- Cookie storage for axis mapping ---
    const COOKIE_NAME = "svg2gcode_config";
    const COOKIE_DAYS = 30;

    function saveConfig() {
      const config = {
        mapX: $("mapX").value,
        mapY: $("mapY").value,
        mirrorX: $("mirrorX").checked,
        mirrorY: $("mirrorY").checked
      };
      const expires = new Date(Date.now() + COOKIE_DAYS * 864e5).toUTCString();
      document.cookie = `${COOKIE_NAME}=${encodeURIComponent(JSON.stringify(config))}; expires=${expires}; path=/`;
    }

    function loadConfig() {
      const match = document.cookie.match(new RegExp(`(?:^|; )${COOKIE_NAME}=([^;]*)`));
      if (!match) return false;
      try {
        const config = JSON.parse(decodeURIComponent(match[1]));
        if (config.mapX && ["X","Y","Z"].includes(config.mapX)) $("mapX").value = config.mapX;
        if (config.mapY && ["X","Y","Z"].includes(config.mapY)) $("mapY").value = config.mapY;
        if (typeof config.mirrorX === "boolean") $("mirrorX").checked = config.mirrorX;
        if (typeof config.mirrorY === "boolean") $("mirrorY").checked = config.mirrorY;
        return true;
      } catch (e) {
        console.warn("Failed to parse cookie", e);
        return false;
      }
    }

    
    // Refresh the preview if a path is already loaded
    function refreshPreviewIfLoaded() {
      if (parsedPath) {
        renderPreview(parsedPath);
      }
    }
// Load config and attach change listeners on page load
    document.addEventListener("DOMContentLoaded", () => {
      loadConfig();
      [$("mapX"), $("mapY"), $("mirrorX"), $("mirrorY")].forEach(el => {
        if (el) el.addEventListener("change", () => {
          saveConfig();
          refreshPreviewIfLoaded();
        });
      });
    });
// --- Zustand ---
    let svgText = "";
    let parsedPath = null; // SVGPathElement (aus DOMParser-Dokument)
    let lastGcode = "";
    let lastFileBase = "output";

    // Validiert: genau ein <path>, keine weiteren Shape-Elemente.
    function validateSvgStrictOnePath(svgString) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(svgString, "image/svg+xml");

      // Parserfehler erkennen
      if (doc.querySelector("parsererror")) {
        return { ok: false, error: "Invalid SVG (parser error)." };
      }

      const svg = doc.documentElement;
      if (!svg || svg.tagName.toLowerCase() !== "svg") {
        return { ok: false, error: "File does not contain an <svg> root element." };
      }

      const paths = svg.querySelectorAll("path");
      if (paths.length !== 1) {
        return { ok: false, error: `Expected exactly 1 <path>, found: ${paths.length}.` };
      }

      // Verbotene zusätzliche Shapes (laut Anforderung: nur ein Path, keine anderen Shapes)
      const forbiddenShapeSelectors = "rect,circle,ellipse,line,polyline,polygon";
      const others = svg.querySelectorAll(forbiddenShapeSelectors);
      if (others.length > 0) {
        return {
          ok: false,
          error: `Not allowed: other shapes found (${others.length}). Only one <path> is allowed.`
        };
      }

      return { ok: true, svg, path: paths[0] };
    }

    // Zeichnet eine sichere Vorschau: nur den validierten Path in ein eigenes SVG einsetzen.
    function renderPreview(pathEl) {
      const preview = $("preview");
      preview.innerHTML = "";

      const d = pathEl.getAttribute("d") || "";
      const vb = pathEl.ownerSVGElement.getAttribute("viewBox");

      const ns = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      // Use a fixed viewBox for consistent coordinate system
      const viewBox = vb ? vb : "0 0 200 200";
      svg.setAttribute("viewBox", viewBox);
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

      // Get bounding box of the path in its own coordinate system
      const bbox = pathEl.getBBox();
      const centerX = bbox.x + bbox.width / 2;
      const centerY = bbox.y + bbox.height / 2;
      // Target center of viewBox
      const [vbX, vbY, vbWidth, vbHeight] = viewBox.split(/\s+/).map(Number);
      const targetX = vbX + vbWidth / 2;
      const targetY = vbY + vbHeight / 2;
      // Translation to center path
      const tx = targetX - centerX;
      const ty = targetY - centerY;

      const g = document.createElementNS(ns, "g");
      g.setAttribute("transform", `translate(${tx},${ty})`);

      const path = document.createElementNS(ns, "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "#60a5fa");
      path.setAttribute("stroke-width", "1.5");

      g.appendChild(path);
      svg.appendChild(g);
      preview.appendChild(svg);
      addAxisArrows(svg, pathEl);
    }

    
    // Adds labeled coordinate arrows for CNC axes based on current mapping
    function addAxisArrows(svg, pathEl) {
      const ns = "http://www.w3.org/2000/svg";
      // Determine viewBox dimensions
      const viewBox = svg.getAttribute("viewBox");
      const [vbX, vbY, vbWidth, vbHeight] = viewBox ? viewBox.split(/\s+/).map(Number) : [0, 0, 200, 200];
      // Place origin at bottom‑left corner of viewBox with margin
      const margin = Math.max(vbWidth, vbHeight) * 0.05;
      const originX = vbX + margin;
      const originY = vbY + vbHeight - margin;

      // Determine mapping and invert settings
      const map = {
        x: $("mapX").value,
        y: $("mapY").value
      };
      const mirror = {
        x: $("mirrorX").checked,
        y: $("mirrorY").checked
      };

      // For each CNC axis (X, Y, Z) compute its 2D vector in SVG coordinates
      const axes = [
        { name: "X", color: "#ef4444" },
        { name: "Y", color: "#10b981" },
        { name: "Z", color: "#3b82f6" }
      ];

      axes.forEach(axis => {
        let dx = 0, dy = 0;
        // Find which SVG axis maps to this CNC axis
        if (map.x === axis.name) {
          // SVG X maps to this CNC axis
          dx = mirror.x ? -1 : 1;
          dy = 0;
        }
        if (map.y === axis.name) {
          // SVG Y maps to this CNC axis
          dx = 0;
          dy = mirror.y ? -1 : 1; // SVG Y points down, invert flips direction
        }
        // If this CNC axis is not mapped, skip
        if (dx === 0 && dy === 0) return;

        // Scale vector to arrow length (relative to viewBox size)
        const length = Math.max(vbWidth, vbHeight) * 0.15;
        const endX = originX + dx * length;
        const endY = originY + dy * length;

        // Draw arrow line
        const line = document.createElementNS(ns, "line");
        line.setAttribute("x1", originX);
        line.setAttribute("y1", originY);
        line.setAttribute("x2", endX);
        line.setAttribute("y2", endY);
        line.setAttribute("stroke", axis.color);
        line.setAttribute("stroke-width", "2");
        line.setAttribute("marker-end", "url(#arrowhead)");
        svg.appendChild(line);

        // Draw label
        const label = document.createElementNS(ns, "text");
        label.setAttribute("x", endX + dx * 5);
        label.setAttribute("y", endY + dy * 5);
        label.setAttribute("fill", axis.color);
        label.setAttribute("font-size", "12");
        label.setAttribute("font-weight", "bold");
        label.setAttribute("text-anchor", dx > 0 ? "start" : (dx < 0 ? "end" : "middle"));
        label.setAttribute("dy", dy > 0 ? "0.8em" : (dy < 0 ? "-0.2em" : "0"));
        label.textContent = axis.name;
        svg.appendChild(label);
      });

      // Define arrowhead marker if not already present
      if (!svg.querySelector("marker#arrowhead")) {
        const defs = document.createElementNS(ns, "defs");
        const marker = document.createElementNS(ns, "marker");
        marker.setAttribute("id", "arrowhead");
        marker.setAttribute("viewBox", "0 0 10 10");
        marker.setAttribute("refX", "9");
        marker.setAttribute("refY", "5");
        marker.setAttribute("markerWidth", "6");
        marker.setAttribute("markerHeight", "6");
        marker.setAttribute("orient", "auto");
        const path = document.createElementNS(ns, "path");
        path.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        path.setAttribute("fill", "#999");
        marker.appendChild(path);
        defs.appendChild(marker);
        svg.appendChild(defs);
      }
    }

    // Erzeugt Stützpunkte entlang des gesamten Pathes.
    // Damit werden alle Kurven/Bögen (inkl. Arc-Kommandos) automatisch in Liniensegmente zerlegt.
    function samplePath(pathEl, sampleCount) {
      const total = pathEl.getTotalLength();
      if (!isFinite(total) || total <= 0) {
        throw new Error("Pfadlänge ist 0 oder ungültig.");
      }

      const n = Math.max(2, sampleCount | 0);
      const points = [];
      for (let i = 0; i <= n; i++) {
        const t = (i / n) * total;
        const p = pathEl.getPointAtLength(t);
        points.push({ x: p.x, y: p.y });
      }
      return points;
    }

    // Wandelt Punkte in G-Code um mit Achsen-Mapping:
    // SVG X -> G-Code Y
    // SVG Y -> G-Code Z
    // G-Code X bleibt 0 (nicht genutzt, aber explizit gesetzt)
    function pointsToGcode(points, options) {
      const { feed, decimals, headerLines, footerLines } = options;

      // Collect axis mapping
      const map = {
        x: $("mapX").value,
        y: $("mapY").value
      };
      const mirror = {
        x: $("mirrorX").checked,
        y: $("mirrorY").checked
      };

      // Determine bounding box for mirror offsets
      let bbox = null;
      if (mirror.x || mirror.y) {
        // Compute min/max of points (we assume SVG coordinates)
        bbox = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
        for (const p of points) {
          if (p.x < bbox.minX) bbox.minX = p.x;
          if (p.x > bbox.maxX) bbox.maxX = p.x;
          if (p.y < bbox.minY) bbox.minY = p.y;
          if (p.y > bbox.maxY) bbox.maxY = p.y;
        }
      }

      const out = [];
      out.push("; Generated by SVG->GCode (generic mapping)");
      out.push(`; Mapping: SVG X→${map.x || "-"}, Y→${map.y || "-"}`);
      if (mirror.x) out.push("; X inverted");
      if (mirror.y) out.push("; Y inverted");
      out.push(...headerLines);

      if (!points.length) {
        throw new Error("No points to convert.");
      }

      // Helper to map a point to CNC axes
      function mapPoint(p) {
        const cnc = { X: 0, Y: 0, Z: 0 };
        // SVG X → mapped axis
        if (map.x) {
          let val = p.x;
          if (mirror.x && bbox) val = -val + bbox.maxX;
          cnc[map.x] = (cnc[map.x] || 0) + val;
        }
        // SVG Y → mapped axis
        if (map.y) {
          let val = p.y;
          if (mirror.y && bbox) val = -val + bbox.maxY;
          cnc[map.y] = (cnc[map.y] || 0) + val;
        }
        return cnc;
      }

      const first = mapPoint(points[0]);
      out.push(`G0 X${fmt(first.X, decimals)} Y${fmt(first.Y, decimals)} Z${fmt(first.Z, decimals)}`);

      for (let i = 1; i < points.length; i++) {
        const p = mapPoint(points[i]);
        out.push(`G1 X${fmt(p.X, decimals)} Y${fmt(p.Y, decimals)} Z${fmt(p.Z, decimals)} F${feed}`);
      }

      out.push(...footerLines);
      return out.join("\n") + "\n";
    }

    function resetOutput() {
      $("gcodeOut").textContent = "";
      lastGcode = "";
      $("downloadBtn").disabled = true;
      $("copyBtn").disabled = true;
      $("ncviewerBtn").disabled = true;
    }

    $("svgFile").addEventListener("change", async (ev) => {
      resetOutput();
      parsedPath = null;
      setStatus("");

      const file = ev.target.files?.[0];
      if (!file) return;

      lastFileBase = file.name.replace(/\.[^.]+$/, "") || "output";

      try {
        svgText = await file.text();
        const res = validateSvgStrictOnePath(svgText);
        if (!res.ok) {
          $("generateBtn").disabled = true;
          $("preview").innerHTML = `<span class="hint">No preview</span>`;
          setUploadStatus(res.error, true);
          return;
        }

        parsedPath = res.path;
        renderPreview(parsedPath);
        $("generateBtn").disabled = false;
        setUploadStatus("SVG is valid: exactly one <path>, no other shapes.");
      } catch (err) {
        $("generateBtn").disabled = true;
        $("preview").innerHTML = `<span class="hint">No preview</span>`;
        setUploadStatus("Error reading/validating: " + err.message, true);
      }
    });

    $("generateBtn").addEventListener("click", () => {
      if (!parsedPath) {
        setStatus("Please load a valid SVG first.", true);
        return;
      }

      try {
        const sampleCount = Number($("samples").value || 400);
        const feed = Number($("feed").value || 800);
        const decimals = Math.max(0, Math.min(6, Number($("decimals").value || 3)));

        const points = samplePath(parsedPath, sampleCount);
        const gcode = pointsToGcode(points, {
          feed,
          decimals,
          headerLines: linesFromTextarea($("header").value),
          footerLines: linesFromTextarea($("footer").value)
        });

        lastGcode = gcode;
        $("gcodeOut").textContent = gcode;
        $("downloadBtn").disabled = false;
        $("copyBtn").disabled = false;
        $("ncviewerBtn").disabled = false;

        setStatus(`G-Code erzeugt: ${points.length} Punkte (${sampleCount} Segmente).`);
      } catch (err) {
        resetOutput();
        setStatus("Error generating G‑Code: " + err.message, true);
      }
    });

    $("downloadBtn").addEventListener("click", () => {
      if (!lastGcode) return;
      const ext = $("ext").value || "gcode";
      const blob = new Blob([lastGcode], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${lastFileBase || "output"}.${ext}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    $("copyBtn").addEventListener("click", async () => {
      if (!lastGcode) return;
      try {
        await navigator.clipboard.writeText(lastGcode);
        const btn = $("copyBtn");
        const old = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = old), 1200);
        setStatus("G‑Code copied to clipboard.");
      } catch (err) {
        setStatus("Copy failed: " + (err?.message || err), true);
      }
    });

    $("ncviewerBtn").addEventListener("click", async () => {
      if (!lastGcode) return;
      try {
        await navigator.clipboard.writeText(lastGcode);
        setStatus("NCViewer opened. G‑Code is in clipboard.");
      } catch (_) {
        setStatus("NCViewer opened. If needed, copy G‑Code manually.");
      }
      window.open("https://ncviewer.com/", "_blank", "noopener,noreferrer");
    });
  </script>
</body>
</html>
